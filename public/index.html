<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORIS Autonomous</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 40px;
        }
        .logo { font-size: 5rem; margin-bottom: 20px; }
        h1 { 
            font-size: 3rem; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle { color: #94a3b8; margin-bottom: 50px; font-size: 1.3rem; }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 800px;
            width: 100%;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s;
        }
        .card:hover {
            transform: translateY(-8px);
            border-color: #667eea;
            background: rgba(255,255,255,0.1);
        }
        .card-icon { font-size: 3rem; margin-bottom: 20px; }
        .card-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 10px; }
        .card-desc { color: #94a3b8; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="logo">🧠</div>
    <h1>MORIS</h1>
    <p class="subtitle">Autonomous Corporate Orchestrator</p>
    
    <div class="cards">
        <a href="/dashboard" class="card">
            <div class="card-icon">📊</div>
            <div class="card-title">Dashboard</div>
            <div class="card-desc">Control center for 21 AI agents</div>
        </a>
        
        <a href="/api" class="card">
            <div class="card-icon">🔌</div>
            <div class="card-title">API</div>
            <div class="card-desc">REST API for integrations</div>
        </a>
        
        <a href="https://github.com/tomasreminek/moris-autonomous" class="card">
            <div class="card-icon">📚</div>
            <div class="card-title">GitHub</div>
            <div class="card-desc">Source code & documentation</div>
        </a>
    </div>
</body>
</html>
