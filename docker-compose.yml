version: '3.8'

services:
  moris-core:
    image: node:18-alpine
    container_name: moris-core
    working_dir: /app
    command: sh -c "npm install express cors dotenv && node server.js"
    ports:
      - "3001:3001"
    volumes:
      - ./core:/app
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped

  moris-dashboard:
    image: node:18-alpine
    container_name: moris-dashboard
    working_dir: /app
    command: npx http-server -p 3005
    ports:
      - "3005:3005"
    volumes:
      - ./public:/app
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: moris-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - moris-core
      - moris-dashboard
    restart: unless-stopped

networks:
  default:
    name: moris-network
