version: '3.8'

services:
  # Redis for task queue
  redis:
    image: redis:7-alpine
    container_name: moris-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # MORIS Core API
  moris-core:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: moris-core
    ports:
      - "3001:3001"
      - "3002:3002"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
    environment:
      - NODE_ENV=production
      - PORT=3001
      - WS_PORT=3002
      - DB_PATH=/app/data/moris.db
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MORIS Dashboard
  moris-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: moris-dashboard
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
      - API_URL=http://moris-core:3001
      - WS_URL=ws://moris-core:3002
    depends_on:
      - moris-core
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: moris-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - moris-core
      - moris-dashboard
    restart: unless-stopped

volumes:
  redis-data: