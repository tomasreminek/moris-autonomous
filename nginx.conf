server {
    listen 80;
    server_name _;
    
    # Landing page
    location = / {
        root /usr/share/nginx/html;
        index index.html;
    }
    
    # Dashboard proxy
    location /dashboard {
        proxy_pass http://moris-dashboard:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # API proxy
    location /api {
        proxy_pass http://moris-core:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Health check
    location /health {
        proxy_pass http://moris-core:3001/health;
        access_log off;
    }
}
